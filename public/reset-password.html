<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password - Coco's Hub Marketplace</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/login.css">
</head>
<body class="auth-body">
  <div class="auth-container">
    <div class="auth-branding">
      <div class="auth-brand-content">
        <a href="/" class="auth-logo">
          <img src="/images/logo.jpeg" alt="Coco's Hub Logo" class="logo-img" style="height: 40px; border-radius: 50%;">
          <span>Coco's Hub</span>
        </a>
        <h1 class="auth-brand-title">Welcome to<br><span>Your Beauty<br>Destination</span></h1>
      </div>
      <div class="auth-brand-bg"></div>
    </div>
    <div class="auth-forms">
      <div class="auth-form-wrapper">
        <form class="auth-form" id="reset-form">
          <div class="form-header"><h2>Create New Password</h2><p>Enter your new password below</p></div>
          <div class="form-group">
            <label for="new-password">New Password</label>
            <div class="input-wrapper">
              <span class="material-icons-outlined input-icon">lock</span>
              <input type="password" id="new-password" placeholder="Create a new password" required minlength="6">
              <button type="button" class="toggle-password" data-target="new-password"><span class="material-icons-outlined">visibility_off</span></button>
            </div>
          </div>
          <div class="form-group">
            <label for="confirm-password">Confirm Password</label>
            <div class="input-wrapper">
              <span class="material-icons-outlined input-icon">lock</span>
              <input type="password" id="confirm-password" placeholder="Confirm your new password" required>
            </div>
          </div>
          <button type="submit" class="btn-primary btn-full" id="reset-btn"><span>Reset Password</span><span class="material-icons-outlined">check</span></button>
          <p class="form-footer-text">Remembered your password? <a href="/login.html" class="link-btn">Sign In</a></p>
        </form>
      </div>
    </div>
  </div>
  <div class="toast-container" id="toast-container"></div>
  <script src="/js/reset-password.js"></script>
</body>
</html>
